# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: 0x.docs.buildwithfern.com
    custom-domain: docs.0x.org

title: 0x Docs

ai-search:
  location:
    - docs

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

announcement:
  message: '🌉 Cross-Chain API is in private beta.  <a href="https://0x.org/products/cross-chain" target="_blank">Request access to start building</a>.'

# Metadata configuration (SEO / Open Graph / Twitter cards)
metadata:
  og:site_name: "0x"
  og:title: "0x Docs - Build with the 0x API"
  og:description: "Developer documentation for the 0x API. Embed swaps in your onchain app. Access 10+ million tokens with liquidity from 150+ exchanges with a single API."
  og:url: "gttps://docs.0x.org"
  og:image: docs/assets/0x-social-card.jpg
  og:locale: en_US

  twitter:title: "0x Docs - Build with the 0x API"
  twitter:handle: "@0xProject"
  twitter:description: "Developer documentation for the 0x API. Embed swaps in your onchain app. Access 10+ million tokens with liquidity from 150+ exchanges with a single API."
  twitter:image: docs/assets/0x-social-card.jpg
  canonical-host: "https://docs.0x.org"
  twitter:card: "summary_large_image"

# Tabs configuration
tabs:
  home:
    display-name: Home
    icon: home
  docs:
    display-name: Docs
    icon: book
  api-reference:
    display-name: API Reference
    icon: puzzle
  liquidity:
    display-name: Liquidity Integration
    icon: water
  changelog:
    display-name: Changelog
    icon: clock
    changelog: docs/changelog

# Navigation structure
navigation:
  - tab: home
    layout:
      - page: Home
        path: docs/pages/index.mdx

  - tab: docs
    layout:
      - section: Introduction
        slug: introduction
        icon: fa-regular fa-compass
        contents:
          - page: Welcome
            slug: welcome
            path: docs/pages/introduction/welcome.mdx
          - section: Quickstart
            contents:
              - page: Create a 0x API Key
                slug: getting-started
                path: docs/pages/introduction/getting-started.mdx
              - page: Swap Tokens with Swap API
                slug: swap-tokens-with-0x-swap-api
                path: docs/pages/0x-swap-api/guides/swap-tokens-with-0x-swap-api.mdx
          - section: Develop with AI
            contents:
              - page: Using AI with 0x
                slug: using-ai-with-0x
                path: docs/pages/introduction/develop-with-ai/using-ai-with-0x.mdx
              - page: MCP
                slug: mcp-setup
                path: docs/pages/introduction/develop-with-ai/mcp-setup.mdx
              - page: AI Project Showcase
                slug: ai-tools
                path: docs/pages/introduction/develop-with-ai/ai-tools.mdx
          - page: Supported Chains
            slug: supported-chains
            path: docs/pages/introduction/supported-chains.mdx
          - link: Demo Apps
            href: https://github.com/0xProject/0x-examples
            target: _blank
          - page: FAQ
            slug: faq
            path: docs/pages/introduction/faq.mdx
          - page: API Issues & Error Codes
            slug: api-issues
            path: docs/pages/introduction/api-issues.mdx
          - page: Need Help?
            slug: need-help
            path: docs/pages/need-help/contact-support.mdx

      - section: Swap API
        slug: 0x-swap-api
        icon: fa-regular fa-arrows-rotate
        contents:
          - page: Introduction
            slug: introduction
            path: docs/pages/0x-swap-api/introduction.mdx
          - section: Guides
            slug: guides
            contents:
              - page: Swap Tokens with Swap API
                slug: swap-tokens-with-0x-swap-api
                path: docs/pages/0x-swap-api/guides/swap-tokens-with-0x-swap-api.mdx
              - page: Build Token Swap App (Next.js)
                slug: build-token-swap-dapp-nextjs
                path: docs/pages/0x-swap-api/guides/build-token-swap-dapp-nextjs.mdx
              - page: Monetize Your App
                slug: monetize-your-app-using-swap
                path: docs/pages/0x-swap-api/guides/monetize-your-app-using-swap.mdx
              - page: Troubleshooting
                slug: troubleshooting-swap-api
                path: docs/pages/0x-swap-api/guides/troubleshooting-swap-api.mdx
              - section: Permit2
                slug: permit2
                contents:
                  - page: Swap Tokens with Permit2
                    slug: swap-tokens-with-0x-swap-api-permit2
                    path: docs/pages/0x-swap-api/guides/swap-tokens-with-0x-swap-api-permit2.mdx
                  - page: Build App with Permit2 (Next.js)
                    slug: build-token-swap-dapp-nextjs-permit2
                    path: docs/pages/0x-swap-api/guides/build-token-swap-dapp-nextjs-permit2.mdx
          - section: Additional Topics
            slug: additional-topics
            contents:
              - page: How to Set Token Allowances
                slug: how-to-set-your-token-allowances
                path: docs/pages/0x-swap-api/additional-topics/how-to-set-your-token-allowances.mdx
              - page: Handling Native Tokens
                slug: handling-native-tokens
                path: docs/pages/0x-swap-api/additional-topics/handling-native-tokens.mdx
              - page: 0x Parser
                slug: 0x-parser
                path: docs/pages/0x-swap-api/additional-topics/0x-parser.mdx
              - page: Sell Entire Balance
                slug: sell-entire-balance
                path: docs/pages/0x-swap-api/additional-topics/sell-entire-balance.mdx
              - page: Buy/Sell Tax Support
                slug: buy-sell-tax-support
                path: docs/pages/0x-swap-api/additional-topics/buy-sell-tax-support.mdx
              - page: Swap and Send
                slug: swap-and-send
                path: docs/pages/0x-swap-api/additional-topics/swap-and-send.mdx
              - page: About the RFQ System
                slug: about-the-rfq-system
                path: docs/pages/0x-swap-api/additional-topics/about-the-rfq-system.mdx
          - page: FAQ
            slug: faq
            path: docs/pages/introduction/faq.mdx

      - section: Gasless API
        slug: gasless-api
        icon: fa-regular fa-gas-pump
        contents:
          - page: Introduction
            slug: introduction
            path: docs/pages/gasless-api/introduction.mdx
          - section: Guides
            slug: guides
            contents:
              - page: Get Started with Gasless API
                slug: get-started-with-gasless-api
                path: docs/pages/gasless-api/guides/get-started-with-gasless-api.mdx
              - page: Understanding Gasless API
                slug: understanding-gasless-api
                path: docs/pages/gasless-api/understanding-gasless-api.mdx
              - page: Technical Appendix
                slug: gasless-api-technical-appendix
                path: docs/pages/gasless-api/guides/gasless-api-technical-appendix.mdx
          - link: Gasless FAQ
            href: /docs/0x-swap-api/faq#gasless-api

      - section: Cross-Chain API
        slug: cross-chain-api
        icon: fa-regular fa-bridge
        contents:
          - link: Learn More (Private Beta)
            href: https://0x.org/products/cross-chain
            target: _blank

      - section: Trade Analytics API
        slug: trade-analytics-api
        icon: fa-regular fa-chart-column
        contents:
          - page: Introduction
            slug: introduction
            path: docs/pages/trade-analytics-api/introduction.mdx
          - page: Transaction Data
            slug: transaction-data
            path: docs/pages/core-concepts/transaction-data.mdx
          - link: Trade Analytics FAQ
            href: /docs/introduction/faq#trade-analytics-api

      - section: Core Concepts
        slug: core-concepts
        icon: fa-regular fa-books
        contents:
          - page: Introduction to 0x
            slug: introduction-to-0x
            path: docs/pages/core-concepts/introduction-to-0x.mdx
          - page: 0x Cheat Sheet
            slug: 0x-cheat-sheet
            path: docs/pages/core-concepts/0x-cheat-sheet.mdx
          - page: Contracts
            slug: contracts
            path: docs/pages/core-concepts/contracts.mdx
          - page: Order Types
            slug: order-types
            path: docs/pages/core-concepts/order-types.mdx
          - page: Glossary
            slug: glossary
            path: docs/pages/core-concepts/glossary.mdx
          - page: White Paper
            slug: white-paper
            path: docs/pages/core-concepts/white-paper.mdx
          - page: Transaction Data
            slug: transaction-data
            path: docs/pages/core-concepts/transaction-data.mdx

      - section: Developer Resources
        slug: developer-resources
        icon: fa-regular fa-screwdriver-wrench
        contents:
          - page: Bounties
            slug: bounties
            path: docs/pages/developer-resources/bounties.mdx
          - page: Rate Limits
            slug: rate-limits
            path: docs/pages/developer-resources/rate-limits.mdx
          - link: System Status
            href: https://0x.statuspal.io/
            target: _blank

      - section: Upgrading
        slug: upgrading
        icon: fa-regular fa-arrow-up
        contents:
          - page: Overview
            slug: overview
            path: docs/pages/upgrading/overview.mdx
          - page: Upgrading to Swap v2
            slug: upgrading-to-swap-v2
            path: docs/pages/upgrading/upgrading-to-swap-v2.mdx
          - page: Upgrading to Gasless v2
            slug: upgrading-to-gasless-v2
            path: docs/pages/upgrading/upgrading-to-gasless-v2.mdx

      - section: Need Help?
        slug: need-help
        icon: fa-regular fa-circle-question
        contents:
          - page: FAQ
            slug: faq
            path: docs/pages/introduction/faq.mdx
          - page: API Issues & Error Codes
            slug: api-issues
            path: docs/pages/introduction/api-issues.mdx
          - page: Contact Support
            slug: contact-support
            path: docs/pages/need-help/contact-support.mdx
          - link: Contact Sales
            href: https://0x.org/contact
            target: _blank

  - tab: api-reference
    layout:
      - page: API Overview
        path: docs/pages/api-reference-overview.mdx
      - api: openapi.json

  - tab: liquidity
    layout:
      - page: Liquidity Integrations
        path: docs/pages/liquidity-integrations.mdx
        icon: fa-regular fa-water

  - tab: changelog

# Navbar links
navbar-links:
  - type: minimal
    text: Contact Support
    url: https://docs.0x.org/docs/introduction/need-help#-contact-developer-support-fastest-direct-help
  - type: minimal
    text: Discord
    url: https://discord.com/invite/official0x
  - type: filled
    text: Go to dashboard
    url: https://dashboard.0x.org/create-account
  - type: github
    value: https://github.com/0xProject

# Colors matching 0x branding
colors:
  accentPrimary:
    dark: "#f3f4f5"
    light: "#25272a"
  background:
    dark: "#181818"
    light: "#f4f4f4"

# Typography - using Neutral (regular weight) for both to avoid bold text
typography:
  headingsFont:
    name: PolySans
    path: docs/assets/fonts/PolySans-Neutral.woff2
  bodyFont:
    name: PolySans
    path: docs/assets/fonts/PolySans-Neutral.woff2

# Logo configuration
logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo-light.svg
  height: 24
  href: https://0x.org

favicon: docs/assets/favicon.svg

# Custom CSS
css: docs/assets/styles.css

# Theme settings
theme:
  page-actions: toolbar
  footer-nav: minimal

page-actions:
  default: copy-page
  options:
    copy-page: true
    view-as-markdown: true
    ask-ai: true
    chatgpt: true
    cursor: true
    vscode: true
    claude: true
