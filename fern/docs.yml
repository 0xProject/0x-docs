# Navbar links
navbar-links:
  - type: minimal
    text: Contact Support
    url: https://docs.0x.org/docs/introduction/need-help#-contact-developer-support-fastest-direct-help
  - type: dropdown
    text: Connect
    links:
      - text: X
        href: https://x.com/0xProject
      - text: Discord
        href: https://discord.com/invite/official0x
  - type: filled
    text: Go to dashboard
    url: https://dashboard.0x.org/create-account
  - type: github
    value: https://github.com/0xProject

# Colors matching 0x branding
colors:
  accentPrimary:
    dark: "#f3f4f5"
    light: "#25272a"
  background:
    dark: "#181818"
    light: "#f4f4f4"

# Typography - using Neutral (regular weight) for both to avoid bold text
typography:
  headingsFont:
    name: PolySans
    path: docs/assets/fonts/PolySans-Neutral.woff2
  bodyFont:
    name: PolySans
    path: docs/assets/fonts/PolySans-Neutral.woff2

# Logo configuration
logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo-light.svg
  height: 24
  href: https://0x.org

favicon: docs/assets/favicon.svg

# Custom CSS
css: docs/assets/styles.css

# Theme settings
theme:
  page-actions: toolbar
  footer-nav: minimal

page-actions:
  default: copy-page
  options:
    copy-page: true
    view-as-markdown: true
    ask-ai: true
    chatgpt: true
    cursor: true
    vscode: true
    claude: true

integrations:
  context7: ./context7.json

redirects:
  - source: /api-reference/openapi-json/swap/allowanceholder-getprice
    destination: /api-reference/evm-ap-is/api-reference/evm-ap-is/swap/api-reference/evm-ap-is/swap/allowanceholder-getquote
  - source: /developer-resources/bounties
    destination: /docs/developer-resources/docs/developer-resources/bounties
  - source: /docs/cross-chain-api/introduction
    destination: /cross-chain/cross-chain-api/introduction
  - source: /docs/0x-swap-api/guides/build-token-swap-dapp-nextjs
    destination: /evm/0x-swap-api/guides/build-token-swap-dapp-nextjs
  - source: /docs/0x-swap-api/guides/monetize-your-app-using-swap
    destination: /evm/0x-swap-api/guides/monetize-your-app-using-swap
  - source: /docs/solana-swap-api/introduction
    destination: /svm/solana-swap-api/introduction
