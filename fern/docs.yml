              - page: Swap and Send
                slug: swap-and-send
                path: docs/pages/0x-swap-api/additional-topics/swap-and-send.mdx
              - page: Exact Buy
                slug: exact-buy
                path: docs/pages/0x-swap-api/additional-topics/exact-buy.mdx
              - page: About the RFQ System
                slug: about-the-rfq-system
                path: docs/pages/0x-swap-api/additional-topics/about-the-rfq-system.mdx
          - page: FAQ
            slug: faq
            path: docs/pages/introduction/faq.mdx

      - section: EVM Gasless API
        slug: gasless-api
        icon: fa-regular fa-gas-pump
        contents:
          - page: Introduction
            slug: introduction
            path: docs/pages/gasless-api/introduction.mdx
          - section: Guides
            slug: guides
            contents:
              - page: Get Started
                slug: get-started-with-gasless-api
                path: docs/pages/gasless-api/guides/get-started-with-gasless-api.mdx
              - page: Understanding Gasless API
                slug: understanding-gasless-api
                path: docs/pages/gasless-api/understanding-gasless-api.mdx
              - page: Technical Appendix
