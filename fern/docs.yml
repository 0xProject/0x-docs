# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: 0x.docs.buildwithfern.com
    custom-domain: docs.0x.org

title: 0x Docs

ai-search:
  location:
    - docs

ai-examples:
  enabled: false

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

announcement:
  message: '⚡️ Solana API is available via priority access.  <a href="https://0x.org/products/solana" target="_blank">Apply now</a> to start building.'

# Metadata configuration (SEO / Open Graph / Twitter cards)
metadata:
  og:site_name: "0x"
  og:title: "0x Docs - Build with the 0x API"
  og:description: "Developer documentation for the 0x API. Embed swaps in your onchain app. Access 10+ million tokens with liquidity from 150+ exchanges with a single API."
  og:url: "gttps://docs.0x.org"
  og:image: docs/assets/0x-social-card.jpg
  og:locale: en_US

  twitter:title: "0x Docs - Build with the 0x API"
  twitter:handle: "@0xProject"
  twitter:description: "Developer documentation for the 0x API. Embed swaps in your onchain app. Access 10+ million tokens with liquidity from 150+ exchanges with a single API."
  twitter:image: docs/assets/0x-social-card.jpg
  canonical-host: "https://docs.0x.org"
  twitter:card: "summary_large_image"

# Tabs configuration
tabs:
  overview:
    display-name: Overview
    slug: docs
  evm:
    display-name: EVM
  svm:
    display-name: SVM
  cross-chain:
    display-name: Cross-Chain
  api-reference:
    display-name: API Reference
  liquidity:
    display-name: Liquidity Integration
  changelog:
    display-name: Changelog
    changelog: docs/changelog

# Navigation structure
navigation:
  - tab: overview
    layout:
      - section: Introduction
        slug: introduction
        icon: fa-regular fa-compass
        contents:
          - page: Welcome
            path: docs/pages/index.mdx
          - section: Quickstart
            contents:
              - page: Create a 0x API Key
                slug: getting-started
                path: docs/pages/introduction/getting-started.mdx
              - page: Swap Tokens with Swap API
                slug: swap-tokens-with-0x-swap-api
                path: docs/pages/0x-swap-api/guides/swap-tokens-with-0x-swap-api.mdx
          - section: Develop with AI
            contents:
              - page: Using AI with 0x
                slug: using-ai-with-0x
                path: docs/pages/introduction/develop-with-ai/using-ai-with-0x.mdx
              - page: Agent Skills
                slug: agent-skills
                path: docs/pages/introduction/develop-with-ai/agent-skills.mdx
              - page: 0x CLI
                slug: 0x-cli
                path: docs/pages/introduction/develop-with-ai/0x-cli.mdx
              - page: MCP
                slug: mcp-setup
                path: docs/pages/introduction/develop-with-ai/mcp-setup.mdx
              - page: Autonomous Agent Payments
                slug: autonomous-agent-payments
                path: docs/pages/introduction/develop-with-ai/autonomous-agent-payments.mdx
              - page: AI Project Showcase
                slug: ai-tools
                path: docs/pages/introduction/develop-with-ai/ai-tools.mdx
          - page: Supported Chains and Providers
            slug: supported-chains
            path: docs/pages/introduction/supported-chains.mdx
          - link: Example Code
            href: https://github.com/0xProject/0x-examples
            target: _blank
          - page: FAQ
            slug: faq
            path: docs/pages/introduction/faq.mdx
          - page: API Issues & Error Codes
            slug: api-issues
            path: docs/pages/introduction/api-issues.mdx
          - page: Need Help?
            slug: need-help
            path: docs/pages/need-help/contact-support.mdx

      - section: Core Concepts
        slug: core-concepts
        icon: fa-regular fa-books
        contents:
          - page: Introduction to 0x
            slug: introduction-to-0x
            path: docs/pages/core-concepts/introduction-to-0x.mdx
          - page: 0x Cheat Sheet
            slug: 0x-cheat-sheet
            path: docs/pages/core-concepts/0x-cheat-sheet.mdx
          - page: Contracts
            slug: contracts
            path: docs/pages/core-concepts/contracts.mdx
          - page: Order Types
            slug: order-types
            path: docs/pages/core-concepts/order-types.mdx
          - page: Glossary
            slug: glossary
            path: docs/pages/core-concepts/glossary.mdx
          - page: White Paper
            slug: white-paper
            path: docs/pages/core-concepts/white-paper.mdx
          - page: Transaction Data
            slug: transaction-data
            path: docs/pages/core-concepts/transaction-data.mdx

      - section: Developer Resources
        slug: developer-resources
        icon: fa-regular fa-screwdriver-wrench
        contents:
          - page: Bounties
            slug: bounties
            path: docs/pages/developer-resources/bounties.mdx
          - page: Rate Limits
            slug: rate-limits
            path: docs/pages/developer-resources/rate-limits.mdx
          - link: System Status
            href: https://0x.statuspal.io/
            target: _blank

      - section: Upgrading
        slug: upgrading
        icon: fa-regular fa-arrow-up-right-dots
        contents:
          - page: Overview
            slug: overview
            path: docs/pages/upgrading/overview.mdx
          - page: Upgrading to Swap API v2
            slug: upgrading-to-swap-v2
            path: docs/pages/upgrading/upgrading-to-swap-v2.mdx
          - page: Upgrading to Gasless API v2
            slug: upgrading-to-gasless-v2
            path: docs/pages/upgrading/upgrading-to-gasless-v2.mdx

